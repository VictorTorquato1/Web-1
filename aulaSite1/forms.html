<!DOCTYPE html>
<html>

<head>
    <title>Formulários</title>
    <link rel="stylesheet" href="form.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="button.css">
</head>

<body>
    <br>
    <br>
    <h2>Formulários</h2>

    <div class="topbar">
        <a href="index.html">Home</a>
        <a href="listas.html">Listas</a>
        <a href="table.html">Tabelas</a>
        <a href="img.html">Imagens</a>
    </div>

    <br>
    <br>
    <br>

    <form class="formulario" action="https://unipam.edu.br/" method="get">
        <div>
            <input type="text" required placeholder="Nome">
        </div>
        <div>
            <input type="text" required placeholder="Usuário">
        </div>
        <div>
            <input type="email" required placeholder="E-mail">
        </div>
        <div>
            <input type="password" required placeholder="Senha">
        </div>
        <div>
            <input type="number" required placeholder="Idade" min="0" max="100">
        </div>
        <div>
            <input type="tel" required placeholder="(XX) X XXXXX-XXXX">
        </div>
        <div>
            <input type="number" min="0" max="200" placeholder="Peso" step="0.5" required>
        </div>
        <div>
            <input type="range" placeholder="Volume" min="0" max="100" step="10">
        </div>
        <div>
            <fieldset>
                <legend class="legend">Estado Civil</legend>
                <p>
                    <label>
                        <input type="radio" name="est_civil" value="casado"> Casado(a):
                    </label>
                </p>
                <p>
                    <label>
                        <input type="radio" name="est_civil" value="solteiro"> Solteiro:
                    </label>
                </p>
                <p>
                    <label>
                        <input type="radio" name="est_civil" value="divorciado"> Divorciado
                    </label>
                </p>
            </fieldset>
        </div>
        <div>
            <fieldset>
                <legend class="legend">Produtos</legend>
                <p>
                    <label>
                        <input type="checkbox" name="computador" value="computador"> Computador
                        <br>
                        <input type="checkbox" name="impressora" value="impressora"> Impressora
                        <br>
                        <input type="checkbox" name="monitor" value="monitor"> Monitor
                        <br>
                        <input type="checkbox" name="mouse" value="mouse"> Mouse
                        <br>
                        <input type="checkbox" name="teclado" value="teclado"> Teclado
                        <br>
                        <input type="checkbox" name="placamae" value="placamae"> Placa Mãe
                        <br>
                        <input type="checkbox" name="placavideo" value="placavideo"> Placa de Vídeo
                        <br>
                        <input type="checkbox" name="memoriaram" value="memoriaram"> Memória RAM
                        <br>
                        <input type="checkbox" name="fonte" value="fonte"> Fonte
                        <br>
                        <input type="checkbox" name="hdd" value="hdd"> HDD
                        <br>
                        <input type="checkbox" name="ssd" value="ssd"> SSD
                        <br>
                        <input type="checkbox" name="som" value="som"> Caixa de Som
                    </label>
                </p>
            </fieldset>
        </div>
        <div>
            <label>
                Deixe sua sugestão:
                <textarea class="texta" cols="30" rows="5"></textarea>
            </label>
        </div>
        <div>
            <label for="dataEvento">Data do Evento
                <input type="datetime-local" required>
            </label>
        </div>
        <div>
            <p>
                <label>
                    Site: <input type="url" list="sites" name="link">
                </label>
            </p>
            <datalist id="sites">
                <option label="Youtube" value="https://www.youtube.com/"></option>
                <option label="Instagram" value="https://www.instagram.com/"></option>
                <option label="Discord" value="https://discord.com/"></option>
            </datalist>
        </div>

        <button class="botaoEnviar" type="submit">Enviar</button>
        <br>
    </form>
</body>

</html>
