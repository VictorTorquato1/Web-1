<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="check.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tonics Satchel</title>
</head>

<script>
    function confirmSatchel(button) {

        const satchel = button.closest(".satchel")
        const checkboxes = satchel.querySelectorAll("input[type='checkbox']")
        let complete = true

        checkboxes.forEach(cb => {
            if (!cb.checked) {
                complete = false
            }
        })

        const status = satchel.querySelector(".status")

        if (complete) {

            status.textContent = "Satchel crafted!"
            status.classList.remove("error")
            status.classList.add("success")

            satchel.classList.add("crafted")

        } else {

            status.textContent = "Still missing materials."
            status.classList.remove("success")
            status.classList.add("error")

        }
    }
</script>

<body>
    <div>
        <form action="index.html">
            <button class="buttonHome" type="submit">Home
                <img src="home.png" class="icon">
            </button>
        </form>
    </div>
    <br>
    <br>
    <div class="satchel">
        <div>
            <h1 class="title">Tonics Satchel Requirements:</h1>
        </div>
        <br>
        <div>
            <fieldset>
                <legend class="title">Requirements</legend>
                <p>
                    <label class="title">
                        <input type="checkbox" name="deer" value="deer">Perfect Deer Pelt
                        <br>
                        <input type="checkbox" name="buck" value="buck">Perfect Buck Pelt
                        <br>
                        <input type="checkbox" name="elk" value="elk">Perfect Elk Pelt
                    </label>
                </p>
            </fieldset>
        </div>
        <br>
        <div>
            <button class="buttonCon" onclick="confirmSatchel(this)">Confirm Satchel</button>
            <p class="status"></p>
        </div>
    </div>
</body>

</html>
