<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RDR2 Satchel Tracker</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <header>

        <h1>RDR2 Satchel Tracker</h1>
        <p>Track materials and find animal hotspots</p>

    </header>

    <div class="layout">

        <aside>

            <h2>Satchels</h2>

            <div id="satchelList"></div>

            <div class="globalProgress">

                <h3>Overall Progress</h3>

                <div id="globalText"></div>

                <div class="progressBar">
                    <div id="globalFill"></div>
                </div>

            </div>

        </aside>

        <main>

            <div id="map">

                <img src="assets/map/rdr2map.jpg">

            </div>

        </main>

    </div>

    <script src="js/satchels.js"></script>
    <script src="js/animals.js"></script>
    <script src="js/script.js"></script>

</body>

</html>
